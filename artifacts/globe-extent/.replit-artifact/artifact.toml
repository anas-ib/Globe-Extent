kind = "web"
previewPath = "/"
title = "Globe Extent LLP"
version = "1.0.0"
id = "artifacts/globe-extent"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21160

[services.development]
run = "pnpm --filter @workspace/globe-extent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/globe-extent", "run", "build" ]
serve = "static"
publicDir = "artifacts/globe-extent/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21160"
BASE_PATH = "/"
